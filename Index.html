<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#1C0F07" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Brewlog" />
  <title>Brewlog Loyalty</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --espresso: #1C0F07;
      --dark-brown: #2E1A0E;
      --mid-brown: #4A2C17;
      --warm-brown: #7B4A2D;
      --tan: #C4864A;
      --gold: #D4A55A;
      --cream: #F5ECD7;
      --off-white: #FDF8F0;
      --ember: #E8622A;
      --ember-glow: #F4A24A;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      min-height: 100%;
      background: var(--espresso);
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--cream);
      padding: calc(18px + var(--safe-top)) 16px calc(28px + var(--safe-bottom));
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(92deg, transparent 0px, transparent 18px, rgba(255,255,255,0.012) 18px, rgba(255,255,255,0.012) 19px),
        repeating-linear-gradient(180deg, transparent 0px, transparent 60px, rgba(0,0,0,0.06) 60px, rgba(0,0,0,0.06) 61px);
    }

    body::after {
      content: '';
      position: fixed;
      left: 50%;
      bottom: -120px;
      transform: translateX(-50%);
      width: 720px;
      height: 340px;
      background: radial-gradient(ellipse at center bottom, rgba(232,98,42,0.14) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(212,165,90,0.85);
      overflow: hidden;
      background: radial-gradient(circle at 30% 30%, #8f5a2b 0%, #402113 60%, #2b160d 100%);
      box-shadow: 0 0 20px rgba(212,165,90,0.18), 0 6px 20px rgba(0,0,0,0.45);
      display: grid;
      place-items: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
    }

    .brand-tagline {
      margin-top: 3px;
      font-size: 10px;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      color: rgba(212,165,90,0.82);
    }

    .ghost-btn, .wallet-btn, .primary-btn, .mini-btn {
      border: 0;
      cursor: pointer;
      font: inherit;
      transition: transform .15s ease, opacity .15s ease;
    }

    .ghost-btn:active, .wallet-btn:active, .primary-btn:active, .mini-btn:active {
      transform: scale(.98);
    }

    .ghost-btn {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--cream);
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(212,165,90,0.1);
    }

    .hero-note {
      font-size: 12px;
      color: rgba(245,236,215,0.48);
      text-align: center;
    }

    .install-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(212,165,90,0.12), rgba(232,98,42,0.12));
      border: 1px solid rgba(212,165,90,0.16);
    }

    .install-banner.show {
      display: flex;
    }

    .install-copy {
      font-size: 12px;
      color: rgba(245,236,215,0.78);
      line-height: 1.45;
    }

    .mini-btn {
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--cream);
      color: var(--espresso);
      font-size: 12px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .card {
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(160deg, var(--dark-brown) 0%, var(--mid-brown) 56%, #3A2010 100%);
      border: 1px solid rgba(212,165,90,0.18);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 24px 64px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .card-topband {
      height: 4px;
      background: linear-gradient(90deg, var(--ember), var(--gold), var(--ember));
    }

    .card-body {
      padding: 18px 18px 16px;
    }

    .member-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .member-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
    }

    .member-id {
      margin-top: 4px;
      color: rgba(212,165,90,0.76);
      letter-spacing: 1.5px;
      font-size: 11px;
    }

    .status-badge {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--off-white);
      background: linear-gradient(135deg, var(--ember), var(--ember-glow));
      box-shadow: 0 4px 14px rgba(232,98,42,0.34);
      white-space: nowrap;
    }

    .rule {
      height: 1px;
      margin-bottom: 16px;
      background: linear-gradient(90deg, transparent, rgba(212,165,90,0.26), transparent);
    }

    .stamps-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stamps-label {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      color: rgba(245,236,215,0.38);
    }

    .reward-note {
      font-size: 10px;
      color: rgba(212,165,90,0.84);
      letter-spacing: .8px;
      text-align: right;
    }

    .stamps-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }

    .stamp {
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      user-select: none;
    }

    .stamp.filled {
      background: linear-gradient(145deg, var(--tan), var(--warm-brown));
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .stamp.empty {
      background: rgba(255,255,255,0.04);
      border: 1.5px dashed rgba(212,165,90,0.18);
    }

    .stamp.reward-slot {
      background: linear-gradient(145deg, #3A1A08, #251006);
      border: 1.5px solid rgba(232,98,42,0.28);
      opacity: .45;
    }

    .stamp.reward-slot.earned {
      opacity: 1;
      border-color: var(--ember);
      box-shadow: 0 0 18px rgba(232,98,42,0.42);
    }

    .progress-bar-wrap {
      height: 6px;
      border-radius: 999px;
      background: rgba(0,0,0,0.26);
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--ember), var(--gold));
      box-shadow: 0 0 8px rgba(232,98,42,0.5);
      transition: width .35s ease;
    }

    .progress-caption {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 11px;
      color: rgba(245,236,215,0.48);
    }

    .progress-caption strong {
      color: var(--cream);
    }

    .barcode-zone {
      margin-top: 18px;
      background: var(--off-white);
      border-radius: 15px;
      padding: 14px 14px 10px;
      color: var(--espresso);
    }

    .barcode-bars {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      height: 46px;
    }

    .bar {
      background: var(--espresso);
      border-radius: 1px;
    }

    .barcode-num {
      margin-top: 8px;
      text-align: center;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(28,15,7,0.42);
      word-break: break-word;
    }

    .section {
      width: 100%;
      border-radius: 18px;
      padding: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(212,165,90,0.1);
    }

    .section h2 {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      color: rgba(212,165,90,0.76);
      margin-bottom: 12px;
    }

    .wallet-grid, .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .wallet-btn {
      border-radius: 14px;
      padding: 14px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-size: 13px;
      font-weight: 900;
      min-height: 50px;
    }

    .wallet-apple {
      background: var(--cream);
      color: var(--espresso);
    }

    .wallet-google {
      background: linear-gradient(135deg, #2E6AE0, #1EA362);
      color: #fff;
    }

    .primary-btn {
      border-radius: 14px;
      padding: 14px 16px;
      min-height: 48px;
      font-size: 14px;
      font-weight: 900;
      color: var(--espresso);
      background: linear-gradient(135deg, var(--ember), var(--gold));
    }

    .primary-btn.secondary {
      color: var(--cream);
      background: rgba(255,255,255,0.06);
      border: 1px
